# configs/lstm_config.yaml

model:
  name: "LSTM"
  units: [64, 32]  # Multi-layer support
  dense_units: 32
  dropout: 0.3
  recurrent_dropout: 0.0
  weight_decay: 0.01

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  monitor: "val_loss"
  early_stopping_patience: 10
  reduction_patience: 5

data:
  classes: ["NORMAL", "AGGRESSIVE", "DROWSY"]

logging:
  project_name: "driver-monitoring-system"
