# configs/fixed_split_config.yaml
# ==============================
# Configuration for the Fixed Split pipeline
# Build data for specific Train/Val/Test driver sets

dataset:
  processed_dir: "data/processed/UAH-DRIVESET-v1"

split:
  train: ["D1", "D2", "D3", "D4"]
  val:   ["D5"]
  test:  ["D6"]

windows:
  - name: "w3s"
    window_length: 30
    stride: 10
  - name: "w6s"
    window_length: 60
    stride: 10
  - name: "w8s"
    window_length: 80
    stride: 10
  - name: "w10s"
    window_length: 100
    stride: 10

output:
  ready_dir: "data/ready/UAH-DRIVESET-v1-fixed"
