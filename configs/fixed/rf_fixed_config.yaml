# configs/rf_fixed_config.yaml
# ===========================
# Best-tuned parameters from previous experimentation

wandb:
  project: driver-monitoring-fixed-split
  experiment_name: RandomForest_FixedSplit
  entity: omarhariri-syrian-private-university

model:
  n_estimators: 300
  max_depth: 30
  min_samples_split: 5
  min_samples_leaf: 2
  max_features: "sqrt"
  class_weight: "balanced"
  random_state: 42
  n_jobs: -1

output:
  class_names: ["NORMAL", "AGGRESSIVE", "DROWSY"]
